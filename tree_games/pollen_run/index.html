// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(type) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  if (type === 'pollinate') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(1200, t + 0.1);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.2);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
    osc.start(t); osc.stop(t + 0.25);
  } else if (type === 'hit') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
    osc.start(t); osc.stop(t + 0.25);
  } else if (type === 'levelup') {
    osc.type = 'sine';
    [523, 659, 784, 1047].forEach((f, i) => osc.frequency.setValueAtTime(f, t + i * 0.12));
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.55);
    osc.start(t); osc.stop(t + 0.55);
  } else if (type === 'wind') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.linearRampToValueAtTime(300, t + 0.3);
    osc.frequency.linearRampToValueAtTime(100, t + 0.6);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
    osc.start(t); osc.stop(t + 0.6);
  } else if (type === 'gameover') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.5);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
    osc.start(t); osc.stop(t + 0.6);
  } else if (type === 'frog') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(400, t + 0.08);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
    osc.start(t); osc.stop(t + 0.25);
  } else if (type === 'scroll') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.setValueAtTime(1100, t + 0.08);
    osc.frequency.setValueAtTime(1320, t + 0.16);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    osc.start(t); osc.stop(t + 0.3);
  } else if (type === 'multiplier') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(700, t);
    osc.frequency.setValueAtTime(900, t + 0.06);
    osc.frequency.setValueAtTime(1100, t + 0.12);
    osc.frequency.setValueAtTime(1400, t + 0.18);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    osc.start(t); osc.stop(t + 0.3);
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let factPool = { tree: [], obstacle: [], introFacts: [], scrollFacts: [] };
let collectedFacts = [];
let totalScrollsCollected = 0;

function assignFacts() {
  const treeFacts = shuffle(FACTS.filter(f => f.type === 'tree'));
  const obstacleFacts = shuffle(FACTS.filter(f => f.type === 'obstacle'));
  factPool.introFacts = treeFacts.splice(0, 4);
  const scrollMix = shuffle([...treeFacts.splice(0, 8), ...obstacleFacts.splice(0, 8)]);
  factPool.scrollFacts = [scrollMix.slice(0, 4), scrollMix.slice(4, 8), scrollMix.slice(8, 12), scrollMix.slice(12, 16)];
  collectedFacts = [];
  totalScrollsCollected = 0;
}

// ── Game State ──
const keys = {};
let game = {
  screen: 'title',
  level: 0, lives: 3,
  score: 0, levelScore: 0, multiplier: 1,
  player: { x: 0, y: 0, vx: 0, vy: 0 },
  blossoms: [], wasps: [], spiders: [], frogs: [], scrolls: [],
  wind: { active: false, dir: 0, timer: 0, warning: 0 },
  particles: [], scorePopups: [], stars: [],
  invincible: 0, shakeTimer: 0, time: 0,
  currentFact: null,
  openScrollIdx: -1, // for level complete screen
  scrollsRevealed: [], // which scrolls have been opened
  encyclopediaScroll: 0,
  multFlashTimer: 0,
  hoveredLevel: -1,
};

function initLevel(lvlIdx) {
  const lvl = LEVELS[lvlIdx];
  const W = canvas.width, H = canvas.height;
  const groundY = H * 0.82;

  game.level = lvlIdx;
  game.screen = 'intro';
  game.lives = 3;
  game.invincible = 0;
  game.shakeTimer = 0;
  game.time = 0;
  game.particles = [];
  game.scorePopups = [];
  game.currentFact = factPool.introFacts[lvlIdx];
  game.levelScore = 0;
  game.multiplier = 1;
  game.openScrollIdx = -1;
  game.scrollsRevealed = [];
  game.multFlashTimer = 0;

  game.player = { x: 100, y: H * 0.4, vx: 0, vy: 0 };

  game.blossoms = [];
  const treeCX = W * 0.5, treeCY = H * 0.35;
  const spread = Math.min(W, H) * 0.3;
  for (let i = 0; i < lvl.blossomCount; i++) {
    const angle = (i / lvl.blossomCount) * Math.PI * 2 + Math.random() * 0.5;
    const dist = spread * (0.3 + Math.random() * 0.7);
    game.blossoms.push({
      x: treeCX + Math.cos(angle) * dist,
      y: treeCY + Math.sin(angle) * dist * 0.7,
      pollinated: false, glowPhase: Math.random() * Math.PI * 2,
      size: 20 + Math.random() * 10,
    });
    const last = game.blossoms[game.blossoms.length - 1];
    if (last.y > groundY - 40) last.y = groundY - 40 - Math.random() * 60;
    if (last.y < 50) last.y = 50 + Math.random() * 40;
    if (last.x < 60) last.x = 60 + Math.random() * 40;
    if (last.x > W - 60) last.x = W - 60 - Math.random() * 40;
  }

  game.scrolls = [];
  const scrollFacts = factPool.scrollFacts[lvlIdx] || [];
  for (let i = 0; i < scrollFacts.length; i++) {
    let sx, sy, tries = 0;
    do {
      sx = 80 + Math.random() * (W - 160);
      sy = 60 + Math.random() * (groundY - 120);
      tries++;
    } while (tries < 30 && game.blossoms.some(b => Math.hypot(b.x - sx, b.y - sy) < 50));
    game.scrolls.push({ x: sx, y: sy, fact: scrollFacts[i], collected: false, glowPhase: Math.random() * Math.PI * 2 });
  }

  game.wasps = [];
  if (lvl.obstacles.includes('wasps')) {
    const count = lvlIdx === 0 ? 2 : 3;
    for (let i = 0; i < count; i++)
      game.wasps.push({ x: W * 0.6 + Math.random() * W * 0.3, y: 80 + Math.random() * (groundY - 160), vx: 0, vy: 0, phase: Math.random() * Math.PI * 2 });
  }

  game.spiders = [];
  if (lvl.obstacles.includes('spiders')) {
    const count = lvlIdx === 1 ? 3 : 2;
    for (let i = 0; i < count; i++)
      game.spiders.push({ x: W * 0.25 + Math.random() * W * 0.5, y: 60 + Math.random() * (groundY - 200), webRadius: 45 + Math.random() * 25, phase: Math.random() * Math.PI * 2 });
    // Push blossoms out of spider webs so none are trapped inside
    for (const b of game.blossoms) {
      for (const s of game.spiders) {
        const dx = b.x - s.x, dy = b.y - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < s.webRadius + b.size + 10) {
          const angle = dist > 0 ? Math.atan2(dy, dx) : Math.random() * Math.PI * 2;
          const pushDist = s.webRadius + b.size + 15;
          b.x = s.x + Math.cos(angle) * pushDist;
          b.y = s.y + Math.sin(angle) * pushDist;
          b.x = Math.max(60, Math.min(W - 60, b.x));
          b.y = Math.max(50, Math.min(groundY - 40, b.y));
        }
      }
    }
  }

  game.frogs = [];
  if (lvl.obstacles.includes('frogs')) {
    const count = lvlIdx === 2 ? 2 : 3;
    for (let i = 0; i < count; i++)
      game.frogs.push({ x: W * 0.2 + (i / count) * W * 0.6, y: groundY, state: 'sitting', timer: 120 + Math.floor(Math.random() * 180), lungeY: 0, targetY: 0 });
  }

  game.wind = { active: false, dir: 0, timer: 200 + Math.floor(Math.random() * 200), warning: 0 };

  game.stars = [];
  if (lvl.dusk) {
    for (let i = 0; i < 80; i++)
      game.stars.push({ x: Math.random() * W, y: Math.random() * H * 0.6, size: 0.5 + Math.random() * 2, twinkle: Math.random() * Math.PI * 2 });
  }
}

// ── High Score Saving ──
function saveHighScore(score) {
  if (score <= 0) return;
  const name = prompt(`Score: ${score.toLocaleString()}! Enter your name for the high scores:`, 'Player');
  if (!name) return;
  const key = 'tree_games_scores_pollen_run';
  let scores = [];
  try { scores = JSON.parse(localStorage.getItem(key)) || []; } catch {}
  scores.push({ name: name.trim().slice(0, 20), score, date: new Date().toISOString() });
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 10);
  localStorage.setItem(key, JSON.stringify(scores));
}

// ── Input ──
function startFromLevelSelect(lvlIdx) {
  ensureAudio();
  assignFacts();
  game.score = 0;
  initLevel(lvlIdx);
}

function handleTitleClick(cx, cy) {
  for (const r of levelCardRects) {
    if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
      startFromLevelSelect(r.level);
      return true;
    }
  }
  return false;
}

function handleAction() {
  ensureAudio();
  if (game.screen === 'title') return; // must click a level card
  else if (game.screen === 'intro') {
    if (game.currentFact) collectedFacts.push(game.currentFact);
    game.screen = 'playing';
  }
  else if (game.screen === 'levelComplete') {
    if (game.openScrollIdx >= 0) { game.openScrollIdx = -1; return; }
    const collectedScrolls = game.scrolls.filter(s => s.collected);
    const allRevealed = collectedScrolls.length === 0 || game.scrollsRevealed.length >= collectedScrolls.length;
    if (!allRevealed) return; // must open all scrolls first
    if (game.level + 1 < LEVELS.length) initLevel(game.level + 1);
    else { saveHighScore(game.score); game.screen = 'encyclopedia'; game.encyclopediaScroll = 0; }
  }
  else if (game.screen === 'gameover') { saveHighScore(game.score); game.screen = 'title'; }
  else if (game.screen === 'win') game.screen = 'title';
  else if (game.screen === 'encyclopedia') game.screen = 'win';
}

// Click/touch on level complete scrolls
let lastClickX = 0, lastClickY = 0;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === ' ' || e.key === 'Enter') handleAction();
  if (game.screen === 'encyclopedia') {
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') game.encyclopediaScroll += 40;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') game.encyclopediaScroll = Math.max(0, game.encyclopediaScroll - 40);
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', e => {
  lastClickX = e.clientX; lastClickY = e.clientY;
  if (game.screen === 'title') {
    handleTitleClick(e.clientX, e.clientY);
  } else if (game.screen === 'levelComplete') {
    handleLevelCompleteClick(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mousemove', e => {
  if (game.screen === 'title') {
    game.hoveredLevel = -1;
    for (const r of levelCardRects) {
      if (e.clientX >= r.x && e.clientX <= r.x + r.w && e.clientY >= r.y && e.clientY <= r.y + r.h) {
        game.hoveredLevel = r.level;
        break;
      }
    }
    canvas.style.cursor = game.hoveredLevel >= 0 ? 'pointer' : 'default';
  } else {
    canvas.style.cursor = 'default';
  }
});

let touchStart = null, touchCurrent = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (game.screen === 'title') {
    handleTitleClick(t.clientX, t.clientY);
    return;
  }
  if (game.screen === 'levelComplete') {
    handleLevelCompleteClick(t.clientX, t.clientY);
    return;
  }
  if (game.screen !== 'playing') { handleAction(); return; }
  touchStart = { x: t.clientX, y: t.clientY };
  touchCurrent = { x: t.clientX, y: t.clientY };
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches[0]) touchCurrent = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchStart = null; touchCurrent = null; }, { passive: false });

// Level complete click handler
function handleLevelCompleteClick(cx, cy) {
  const W = canvas.width, H = canvas.height;

  // If a scroll is open, close it
  if (game.openScrollIdx >= 0) {
    game.openScrollIdx = -1;
    return;
  }

  // Check if clicking a scroll icon
  const collectedScrolls = game.scrolls.filter(s => s.collected);
  if (collectedScrolls.length > 0) {
    const scrollY = game.lcScrollY || 0;
    const scrollStartX = game.lcScrollStartX || 0;
    const spacing = 72;
    for (let i = 0; i < collectedScrolls.length; i++) {
      const sx = scrollStartX + i * spacing;
      if (cx > sx - 30 && cx < sx + 30 && cy > scrollY - 30 && cy < scrollY + 30) {
        // Mark as revealed and open
        if (!game.scrollsRevealed.includes(i)) {
          game.scrollsRevealed.push(i);
          playSound('scroll');
        }
        game.openScrollIdx = i;
        return;
      }
    }
  }

  // Otherwise try to advance
  handleAction();
}

// ── Score Popup ──
function addScorePopup(x, y, points, text) {
  game.scorePopups.push({
    x, y, text: text || `+${points}`,
    life: 1, vy: -1.5,
    color: points >= 300 ? '#FFD700' : points >= 200 ? '#FF6B35' : '#4CAF50',
    size: points >= 300 ? 28 : 22,
  });
}

// ── Update ──
function update() {
  if (game.screen !== 'playing') return;

  const lvl = LEVELS[game.level];
  const W = canvas.width, H = canvas.height;
  const groundY = H * 0.82;
  const p = game.player;
  game.time++;

  if (game.invincible > 0) game.invincible--;
  if (game.shakeTimer > 0) game.shakeTimer--;
  if (game.multFlashTimer > 0) game.multFlashTimer--;

  let ax = 0, ay = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) ax -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ax += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) ay -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) ay += 1;

  if (touchStart && touchCurrent) {
    const dx = touchCurrent.x - touchStart.x, dy = touchCurrent.y - touchStart.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 15) { ax += (dx / dist) * Math.min(dist / 40, 1); ay += (dy / dist) * Math.min(dist / 40, 1); }
  }

  p.vx += ax * lvl.speed * 0.2;
  p.vy += ay * lvl.speed * 0.2;
  p.vx *= (1 - lvl.inertia);
  p.vy *= (1 - lvl.inertia);
  if (game.wind.active) p.vx += game.wind.dir * 1.5;
  p.x += p.vx; p.y += p.vy;
  p.x = Math.max(20, Math.min(W - 20, p.x));
  p.y = Math.max(20, Math.min(groundY - 15, p.y));

  // Collect scrolls — increases multiplier
  for (const s of game.scrolls) {
    if (s.collected) continue;
    const dx = p.x - s.x, dy = p.y - s.y;
    if (Math.sqrt(dx * dx + dy * dy) < 28) {
      s.collected = true;
      totalScrollsCollected++;
      collectedFacts.push(s.fact);
      game.multiplier++;
      game.multFlashTimer = 60;
      playSound('multiplier');
      addScorePopup(s.x, s.y - 20, 0, `x${game.multiplier} MULTIPLIER!`);
      for (let i = 0; i < 12; i++) {
        game.particles.push({
          x: s.x + (Math.random() - 0.5) * 20, y: s.y + (Math.random() - 0.5) * 20,
          vx: (Math.random() - 0.5) * 4, vy: -1 - Math.random() * 3,
          life: 1, decay: 0.02, size: 12, emoji: '✨',
        });
      }
    }
  }

  // Pollinate blossoms — score!
  for (const b of game.blossoms) {
    if (b.pollinated) continue;
    const dx = p.x - b.x, dy = p.y - b.y;
    if (Math.sqrt(dx * dx + dy * dy) < b.size + 15) {
      b.pollinated = true;
      playSound('pollinate');

      const basePoints = 100 * (1 + game.level); // 100, 200, 300, 400 per level
      const points = basePoints * game.multiplier;
      game.levelScore += points;
      game.score += points;
      addScorePopup(b.x, b.y - 20, points);

      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        game.particles.push({ x: b.x, y: b.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, decay: 0.02, size: 3 + Math.random() * 4, color: '#FFD54F' });
      }
      for (let i = 0; i < 6; i++) {
        game.particles.push({ x: b.x + (Math.random() - 0.5) * 30, y: b.y + (Math.random() - 0.5) * 30, vx: 0, vy: -0.5 - Math.random(), life: 1, decay: 0.015, size: 10, emoji: '✨' });
      }

      if (game.blossoms.every(bl => bl.pollinated)) {
        // Completion bonus — lives remaining * 500 * multiplier
        const bonus = game.lives * 500 * game.multiplier;
        game.levelScore += bonus;
        game.score += bonus;
        playSound('levelup');
        game.screen = 'levelComplete';
      }
    }
  }

  // Wasps
  for (const w of game.wasps) {
    const dx = p.x - w.x, dy = p.y - w.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const cs = 1.2 + game.level * 0.3;
    if (dist > 0) { w.vx += (dx / dist) * cs * 0.08; w.vy += (dy / dist) * cs * 0.08; }
    w.phase += 0.1; w.vx += Math.sin(w.phase) * 0.15; w.vy += Math.cos(w.phase * 0.7) * 0.1;
    w.vx *= 0.95; w.vy *= 0.95; w.x += w.vx; w.y += w.vy;
    w.y = Math.max(30, Math.min(groundY - 20, w.y)); w.x = Math.max(20, Math.min(W - 20, w.x));
    if (game.invincible <= 0 && dist < 28) hitPlayer();
  }

  // Spiders
  for (const s of game.spiders) {
    s.phase += 0.03;
    const dx = p.x - s.x, dy = p.y - s.y;
    if (game.invincible <= 0 && Math.sqrt(dx * dx + dy * dy) < s.webRadius) hitPlayer();
  }

  // Frogs
  for (const f of game.frogs) {
    if (f.state === 'sitting') { f.timer--; if (f.timer <= 0) { f.state = 'warning'; f.timer = 60; f.targetY = p.y; } }
    else if (f.state === 'warning') { f.timer--; if (f.timer <= 0) { f.state = 'lunging'; f.lungeY = 0; f.timer = 20; playSound('frog'); } }
    else if (f.state === 'lunging') {
      f.timer--; const lh = groundY - f.targetY; f.lungeY = Math.min(lh, f.lungeY + lh / 10);
      const dx = p.x - f.x, dy = p.y - (groundY - f.lungeY);
      if (game.invincible <= 0 && Math.sqrt(dx * dx + dy * dy) < 35) hitPlayer();
      if (f.timer <= 0) { f.state = 'returning'; f.timer = 25; }
    } else if (f.state === 'returning') {
      f.timer--; f.lungeY *= 0.85;
      if (f.timer <= 0) { f.state = 'sitting'; f.timer = 120 + Math.floor(Math.random() * 200); f.lungeY = 0; }
    }
  }

  // Wind
  if (lvl.obstacles.includes('wind')) {
    game.wind.timer--;
    if (game.wind.timer <= 0 && !game.wind.active) { game.wind.warning = 90; game.wind.dir = Math.random() > 0.5 ? 1 : -1; game.wind.timer = 0; }
    if (game.wind.warning > 0) {
      game.wind.warning--;
      if (game.wind.warning % 8 === 0) { const sx = game.wind.dir > 0 ? -20 : W + 20; game.particles.push({ x: sx, y: Math.random() * groundY, vx: game.wind.dir * (3 + Math.random() * 2), vy: Math.random() * 2 - 1, life: 1, decay: 0.01, size: 16, emoji: '🍃' }); }
      if (game.wind.warning <= 0) { game.wind.active = true; game.wind.timer = 90; playSound('wind'); }
    }
    if (game.wind.active) {
      game.wind.timer--;
      if (game.time % 4 === 0) { const sx = game.wind.dir > 0 ? -20 : W + 20; game.particles.push({ x: sx, y: Math.random() * groundY, vx: game.wind.dir * (5 + Math.random() * 4), vy: Math.random() * 3 - 1.5, life: 1, decay: 0.012, size: 16, emoji: '🍃' }); }
      if (game.wind.timer <= 0) { game.wind.active = false; game.wind.timer = 200 + Math.floor(Math.random() * 250); }
    }
  }

  // Particles & score popups
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const pt = game.particles[i]; pt.x += pt.vx || 0; pt.y += pt.vy || 0; if (pt.gravity) pt.vy += pt.gravity; pt.life -= pt.decay; if (pt.life <= 0) game.particles.splice(i, 1);
  }
  for (let i = game.scorePopups.length - 1; i >= 0; i--) {
    const sp = game.scorePopups[i]; sp.y += sp.vy; sp.life -= 0.015; if (sp.life <= 0) game.scorePopups.splice(i, 1);
  }
}

function hitPlayer() {
  if (game.invincible > 0) return;
  game.lives--; game.invincible = 90; game.shakeTimer = 15;
  playSound('hit');
  for (let i = 0; i < 8; i++) game.particles.push({ x: game.player.x, y: game.player.y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 1, decay: 0.03, size: 6, color: '#F44336' });
  if (game.lives <= 0) { playSound('gameover'); game.screen = 'gameover'; }
}

// ── Drawing ──
function drawScene() {
  const W = canvas.width, H = canvas.height, groundY = H * 0.82;
  const lvl = LEVELS[game.level] || LEVELS[0];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lvl.bgTop); grad.addColorStop(0.7, lvl.bgBot); grad.addColorStop(1, lvl.groundColor);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  if (lvl.dusk) {
    for (const s of game.stars) { s.twinkle += 0.03; ctx.globalAlpha = 0.4 + Math.sin(s.twinkle) * 0.4; ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); }
    ctx.globalAlpha = 1; ctx.fillStyle = '#FFF9C4'; ctx.shadowColor = '#FFF9C4'; ctx.shadowBlur = 30; ctx.beginPath(); ctx.arc(W - 100, 80, 35, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#FFF176'; ctx.shadowColor = '#FFD54F'; ctx.shadowBlur = 40; ctx.beginPath(); ctx.arc(W - 100, 80, 40, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  }
  if (!lvl.dusk) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; const co = game.time * 0.3;
    for (let i = 0; i < 4; i++) { const cx = ((i * 300 + co) % (W + 200)) - 100, cy = 40 + i * 35; ctx.beginPath(); ctx.ellipse(cx, cy, 60 + i * 10, 22, 0, 0, Math.PI * 2); ctx.ellipse(cx - 30, cy + 8, 40, 18, 0, 0, Math.PI * 2); ctx.ellipse(cx + 35, cy + 5, 45, 20, 0, 0, Math.PI * 2); ctx.fill(); }
  }
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H); gGrad.addColorStop(0, lvl.groundColor); gGrad.addColorStop(1, '#33691E'); ctx.fillStyle = gGrad; ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = lvl.dusk ? '#2E7D32' : '#8BC34A'; ctx.lineWidth = 2;
  for (let i = 0; i < W; i += 14) { ctx.beginPath(); ctx.moveTo(i, groundY); ctx.quadraticCurveTo(i - 3, groundY - 10 - Math.sin(i * 0.1 + game.time * 0.05) * 3, i + 2, groundY - 13); ctx.stroke(); }
  drawTree(W * 0.5, groundY, lvl);
}

function draw() {
  const W = canvas.width, H = canvas.height, groundY = H * 0.82;
  const lvl = LEVELS[game.level] || LEVELS[0];
  ctx.save();
  if (game.shakeTimer > 0) ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
  drawScene();

  // Blossoms
  for (const b of game.blossoms) {
    if (b.pollinated) { ctx.globalAlpha = 0.5; ctx.font = `${b.size}px serif`; ctx.textAlign = 'center'; ctx.fillText('✅', b.x, b.y + b.size * 0.3); ctx.globalAlpha = 1; }
    else {
      b.glowPhase += 0.04; const gs = 8 + Math.sin(b.glowPhase) * 4;
      ctx.shadowColor = lvl.blossomColor; ctx.shadowBlur = gs + 10;
      ctx.font = `${b.size}px serif`; ctx.textAlign = 'center'; ctx.fillText(lvl.blossomEmoji, b.x, b.y + b.size * 0.3); ctx.shadowBlur = 0;
      ctx.strokeStyle = lvl.blossomColor; ctx.globalAlpha = 0.3 + Math.sin(b.glowPhase) * 0.15; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.size + gs, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1;
    }
  }

  // Scrolls
  for (const s of game.scrolls) {
    if (s.collected) continue;
    s.glowPhase += 0.05; const bob = Math.sin(s.glowPhase) * 4;
    ctx.shadowColor = '#FFD54F'; ctx.shadowBlur = 10 + Math.sin(s.glowPhase * 1.3) * 3;
    ctx.font = '24px serif'; ctx.textAlign = 'center'; ctx.fillText('📜', s.x, s.y + bob + 8); ctx.shadowBlur = 0;
    ctx.strokeStyle = '#FFD54F'; ctx.globalAlpha = 0.3 + Math.sin(s.glowPhase) * 0.2; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(s.x, s.y + bob, 18, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1;
  }

  // Spiders, frogs, wasps
  for (const s of game.spiders) drawSpiderWeb(s);
  for (const f of game.frogs) drawFrog(f, groundY);
  for (const w of game.wasps) {
    ctx.save(); ctx.translate(w.x, w.y);
    const wf = Math.sin(game.time * 0.4) * 0.3;
    ctx.fillStyle = 'rgba(200,200,255,0.5)';
    ctx.save(); ctx.rotate(wf); ctx.beginPath(); ctx.ellipse(-6, -10, 10, 5, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.rotate(-wf); ctx.beginPath(); ctx.ellipse(6, -10, 10, 5, 0.3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.font = '24px serif'; ctx.textAlign = 'center'; ctx.fillText('🐝', 0, 8);
    ctx.globalAlpha = 0.25; ctx.fillStyle = '#F44336'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
  }

  // Wind
  if (game.wind.warning > 0 || game.wind.active) {
    const dir = game.wind.dir;
    ctx.globalAlpha = game.wind.active ? 0.6 : (0.3 + Math.sin(game.time * 0.2) * 0.2);
    ctx.font = '32px serif'; ctx.textAlign = 'center'; ctx.fillText('💨', dir > 0 ? 50 : W - 50, H * 0.15);
    ctx.font = '18px Comic Sans MS, cursive'; ctx.fillStyle = '#fff';
    ctx.fillText(game.wind.active ? 'WIND!' : 'Wind coming!', dir > 0 ? 55 : W - 55, H * 0.15 + 30); ctx.globalAlpha = 1;
  }

  // Particles
  for (const pt of game.particles) {
    ctx.globalAlpha = pt.life;
    if (pt.emoji) { ctx.font = `${pt.size}px serif`; ctx.textAlign = 'center'; ctx.fillText(pt.emoji, pt.x, pt.y); }
    else { ctx.fillStyle = pt.color; ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2); ctx.fill(); }
  }
  ctx.globalAlpha = 1;

  // Score popups
  for (const sp of game.scorePopups) {
    ctx.globalAlpha = sp.life;
    ctx.font = `bold ${sp.size}px Comic Sans MS, cursive`;
    ctx.fillStyle = sp.color; ctx.textAlign = 'center';
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.strokeText(sp.text, sp.x, sp.y);
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;

  // Player
  if (game.screen === 'playing') {
    const p = game.player;
    if (!(game.invincible > 0 && Math.floor(game.invincible / 4) % 2 === 0)) {
      ctx.font = '30px serif'; ctx.textAlign = 'center'; ctx.fillText(lvl.pollinatorEmoji, p.x, p.y + 10);
      if (game.time % 3 === 0 && (Math.abs(p.vx) > 0.5 || Math.abs(p.vy) > 0.5)) {
        game.particles.push({ x: p.x + (Math.random() - 0.5) * 10, y: p.y + (Math.random() - 0.5) * 10, vx: (Math.random() - 0.5) * 0.5, vy: Math.random() * 0.3, life: 0.6, decay: 0.02, size: 2 + Math.random() * 2, color: '#FFE082' });
      }
    }
  }

  // UI: lives
  ctx.font = '28px serif'; ctx.textAlign = 'left';
  for (let i = 0; i < 3; i++) { ctx.globalAlpha = i < game.lives ? 1 : 0.2; ctx.fillText('❤️', 16 + i * 36, 36); }
  ctx.globalAlpha = 1;

  // UI: score
  ctx.font = 'bold 20px Comic Sans MS, cursive'; ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 3;
  ctx.strokeText(`🌟 ${game.score.toLocaleString()}`, 16, 62);
  ctx.fillText(`🌟 ${game.score.toLocaleString()}`, 16, 62);

  // UI: multiplier
  if (game.multiplier > 1) {
    const flash = game.multFlashTimer > 0 ? (1 + Math.sin(game.multFlashTimer * 0.3) * 0.15) : 1;
    ctx.save(); ctx.translate(16, 84); ctx.scale(flash, flash);
    ctx.font = 'bold 18px Comic Sans MS, cursive';
    ctx.fillStyle = '#FFD54F';
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 3;
    ctx.strokeText(`x${game.multiplier} MULTIPLIER`, 0, 0);
    ctx.fillText(`x${game.multiplier} MULTIPLIER`, 0, 0);
    ctx.restore();
  }

  // UI: progress bar
  const total = game.blossoms.length, done = game.blossoms.filter(b => b.pollinated).length;
  const barW = 180, barH = 20, barX = W / 2 - barW / 2, barY = 16;
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 10); ctx.fill();
  ctx.fillStyle = '#66BB6A'; ctx.beginPath(); ctx.roundRect(barX, barY, barW * (done / total), barH, 10); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 10); ctx.stroke();
  ctx.font = '14px Comic Sans MS, cursive'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(`${done}/${total} pollinated`, W / 2, barY + 15);

  // Level name

  ctx.fillText(`${lvl.emoji} ${lvl.name} — ${lvl.pollinatorEmoji} ${lvl.pollinator}`, W - 16, 34);

}

function drawTree(cx, groundY, lvl) {
  const trunkW = 30, trunkH = canvas.height * 0.35;
  ctx.fillStyle = lvl.treeColor; ctx.beginPath();
  ctx.moveTo(cx - trunkW, groundY); ctx.quadraticCurveTo(cx - trunkW * 0.7, groundY - trunkH * 0.5, cx - trunkW * 0.4, groundY - trunkH);
  ctx.lineTo(cx + trunkW * 0.4, groundY - trunkH); ctx.quadraticCurveTo(cx + trunkW * 0.7, groundY - trunkH * 0.5, cx + trunkW, groundY); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) { const by = groundY - trunkH * (0.15 + i * 0.17); ctx.beginPath(); ctx.moveTo(cx - trunkW * 0.25, by); ctx.quadraticCurveTo(cx, by - 4, cx + trunkW * 0.25, by + 2); ctx.stroke(); }
  ctx.strokeStyle = lvl.treeColor; ctx.lineWidth = 8; const brY = groundY - trunkH;
  ctx.beginPath(); ctx.moveTo(cx, brY + 20); ctx.quadraticCurveTo(cx - 80, brY - 20, cx - 120, brY + 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, brY + 10); ctx.quadraticCurveTo(cx + 70, brY - 30, cx + 130, brY - 10); ctx.stroke();
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(cx - 40, brY); ctx.quadraticCurveTo(cx - 60, brY - 60, cx - 30, brY - 80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 30, brY - 5); ctx.quadraticCurveTo(cx + 80, brY - 70, cx + 50, brY - 90); ctx.stroke();
  const cp = [[0, -trunkH - 30, 80], [-60, -trunkH + 10, 60], [65, -trunkH, 65], [-30, -trunkH - 60, 55], [35, -trunkH - 55, 58], [0, -trunkH - 80, 45]];
  for (const [ox, oy, r] of cp) { ctx.fillStyle = lvl.canopyColor; ctx.globalAlpha = 0.85; ctx.beginPath(); ctx.arc(cx + ox, groundY + oy, r, 0, Math.PI * 2); ctx.fill(); }
  ctx.globalAlpha = 1;
}

function drawSpiderWeb(s) {
  const r = s.webRadius;
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x + Math.cos(a) * r, s.y + Math.sin(a) * r); ctx.stroke(); }
  for (let ring = 1; ring <= 3; ring++) { ctx.beginPath(); ctx.arc(s.x, s.y, r * ring / 3, 0, Math.PI * 2); ctx.stroke(); }
  ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.fillText('🕷️', s.x, s.y + 8 + Math.sin(s.phase) * 3);
  ctx.strokeStyle = 'rgba(255,0,0,0.15)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]); ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
}

function drawFrog(f, groundY) {
  const fy = groundY - f.lungeY;
  if (f.state === 'warning') {
    if (Math.sin(game.time * 0.3) > 0) { ctx.font = 'bold 20px Comic Sans MS, cursive'; ctx.fillStyle = '#F44336'; ctx.textAlign = 'center'; ctx.fillText('❗', f.x, groundY - 35); }
    ctx.save(); ctx.translate(f.x, groundY); ctx.scale(1.2, 0.7); ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.fillText('🐸', 0, 5); ctx.restore();
  } else if (f.state === 'lunging' || f.state === 'returning') {
    ctx.save(); ctx.translate(f.x, fy); ctx.scale(0.8, f.state === 'lunging' ? 1.3 : 1.1); ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.fillText('🐸', 0, 10); ctx.restore();
    ctx.strokeStyle = '#E91E63'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(f.x, fy - 5); ctx.lineTo(f.x, fy - 25); ctx.stroke();
    ctx.fillStyle = '#E91E63'; ctx.beginPath(); ctx.arc(f.x, fy - 27, 5, 0, Math.PI * 2); ctx.fill();
  } else { ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.fillText('🐸', f.x, groundY + 8); }
}

// ── Fact Banner ──
function drawFactBanner(text, emoji, alpha, showPrompt) {
  const W = canvas.width, H = canvas.height;
  const cardW = Math.min(520, W * 0.85), cardX = W / 2 - cardW / 2, cardY = H * 0.32;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, 0, W, H);
  ctx.font = `${Math.min(18, W * 0.027)}px Comic Sans MS, cursive`;
  const words = text.split(' '), maxTW = cardW - 50; let lines = [], line = '';
  for (const word of words) { const test = line + word + ' '; if (ctx.measureText(test).width > maxTW && line) { lines.push(line.trim()); line = word + ' '; } else line = test; }
  if (line) lines.push(line.trim());
  const cardH = 80 + lines.length * 26 + (showPrompt ? 40 : 0);
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 24); ctx.fill();
  ctx.strokeStyle = '#66BB6A'; ctx.lineWidth = 4; ctx.stroke();
  ctx.font = '36px serif'; ctx.textAlign = 'center'; ctx.fillText(emoji, W / 2, cardY + 40);
  ctx.font = 'bold 12px Comic Sans MS, cursive'; ctx.fillStyle = '#999'; ctx.fillText('DID YOU KNOW?', W / 2, cardY + 58);
  ctx.font = `${Math.min(18, W * 0.027)}px Comic Sans MS, cursive`; ctx.fillStyle = '#444';
  for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], W / 2, cardY + 82 + i * 26);
  if (showPrompt) {
    const pulse = 1 + Math.sin(game.time * 0.06) * 0.06;
    ctx.save(); ctx.translate(W / 2, cardY + cardH - 18); ctx.scale(pulse, pulse);
    ctx.font = `bold ${Math.min(16, W * 0.025)}px Comic Sans MS, cursive`; ctx.fillStyle = '#FF6B35';
    ctx.fillText('Press SPACE or tap to continue', 0, 0); ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ── Screens ──
// Store level card positions for click detection
let levelCardRects = [];

function drawTitleScreen() {
  const W = canvas.width, H = canvas.height;
  const grad = ctx.createLinearGradient(0, 0, 0, H); grad.addColorStop(0, '#87CEEB'); grad.addColorStop(0.6, '#B3E5FC'); grad.addColorStop(1, '#C8E6C9');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Floating emojis
  const emojis = ['🐝', '🌸', '🪲', '🌺', '🐦', '🦇', '🌳', '🌼'];
  for (let i = 0; i < emojis.length; i++) { ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.fillText(emojis[i], W * 0.15 + (i / emojis.length) * W * 0.7, H * 0.13 + Math.sin(game.time * 0.02 + i * 1.2) * 15); }

  // Title
  ctx.font = `bold ${Math.min(52, W * 0.07)}px Comic Sans MS, cursive`; ctx.fillStyle = '#2E7D32'; ctx.textAlign = 'center';

  ctx.font = `${Math.min(18, W * 0.028)}px Comic Sans MS, cursive`; ctx.fillStyle = '#558B2F';
  ctx.fillText('Choose a level!', W / 2, H * 0.3);

  // Level cards
  const cardW = Math.min(120, W * 0.2);
  const cardH = cardW * 1.3;
  const gap = Math.min(20, W * 0.03);
  const totalW = LEVELS.length * cardW + (LEVELS.length - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const cardY = H * 0.36;

  levelCardRects = [];

  for (let i = 0; i < LEVELS.length; i++) {
    const lvl = LEVELS[i];
    const cx = startX + i * (cardW + gap);
    levelCardRects.push({ x: cx, y: cardY, w: cardW, h: cardH, level: i });

    // Hover effect
    const hovered = game.hoveredLevel === i;
    const scale = hovered ? 1.06 : 1;
    const bob = Math.sin(game.time * 0.03 + i * 0.8) * 3;

    ctx.save();
    ctx.translate(cx + cardW / 2, cardY + cardH / 2 + bob);
    ctx.scale(scale, scale);

    // Card background
    ctx.fillStyle = hovered ? 'rgba(255,255,255,0.98)' : 'rgba(255,255,255,0.88)';
    ctx.beginPath(); ctx.roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 16); ctx.fill();
    ctx.strokeStyle = hovered ? '#FF6B35' : '#66BB6A';
    ctx.lineWidth = hovered ? 4 : 3; ctx.stroke();

    // Level number
    ctx.font = `bold ${Math.min(14, W * 0.02)}px Comic Sans MS, cursive`;
    ctx.fillStyle = '#999'; ctx.textAlign = 'center';
    ctx.fillText(`Level ${i + 1}`, 0, -cardH / 2 + 20);

    // Pollinator emoji
    ctx.font = `${Math.min(36, W * 0.05)}px serif`;
    ctx.fillText(lvl.pollinatorEmoji, 0, -cardH / 2 + 56);

    // Tree emoji
    ctx.font = `${Math.min(20, W * 0.03)}px serif`;
    ctx.fillText(lvl.emoji, 0, -cardH / 2 + 80);

    // Name
    ctx.font = `bold ${Math.min(12, W * 0.018)}px Comic Sans MS, cursive`;
    ctx.fillStyle = '#2E7D32';
    // Split long names
    const name = lvl.name;
    ctx.fillText(name, 0, -cardH / 2 + 100);

    // Pollinator name
    ctx.font = `${Math.min(11, W * 0.016)}px Comic Sans MS, cursive`;
    ctx.fillStyle = '#888';
    ctx.fillText(lvl.pollinator, 0, -cardH / 2 + 116);

    // Dusk badge
    if (lvl.dusk) {
      ctx.font = `${Math.min(10, W * 0.015)}px Comic Sans MS, cursive`;
      ctx.fillStyle = '#7E57C2';
      ctx.fillText('Night!', 0, -cardH / 2 + cardH - 12);
    }

    ctx.restore();

  ctx.save(); ctx.translate(W / 2, hintY + 35); ctx.scale(pulse, pulse);

function drawIntroScreen() {
  const W = canvas.width, H = canvas.height, lvl = LEVELS[game.level];
  drawScene();
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);

  ctx.fillText(`Level ${game.level + 1}: ${lvl.emoji} ${lvl.name}`, W / 2, cardY + 40);
  ctx.font = `${Math.min(20, W * 0.03)}px Comic Sans MS, cursive`; ctx.fillStyle = '#666';
  ctx.fillText(`Play as the ${lvl.pollinatorEmoji} ${lvl.pollinator}!`, W / 2, cardY + 72);
  if (game.currentFact) drawFactBanner(game.currentFact.text, lvl.factEmoji, 1, true);

function drawLevelCompleteScreen() {
  const W = canvas.width, H = canvas.height, lvl = LEVELS[game.level];
  const grad = ctx.createLinearGradient(0, 0, 0, H); grad.addColorStop(0, lvl.bgTop); grad.addColorStop(1, lvl.bgBot);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Confetti
  if (game.time % 8 === 0) { const es = ['🌟', '✨', '🎉', '🌸', '🌺', '🌼']; game.particles.push({ x: Math.random() * W, y: -20, vx: (Math.random() - 0.5) * 2, vy: 1 + Math.random() * 2, life: 1, decay: 0.005, size: 20 + Math.random() * 10, emoji: es[Math.floor(Math.random() * es.length)] }); }
  for (const pt of game.particles) { pt.x += pt.vx || 0; pt.y += pt.vy || 0; pt.life -= pt.decay; ctx.globalAlpha = pt.life; if (pt.emoji) { ctx.font = `${pt.size}px serif`; ctx.textAlign = 'center'; ctx.fillText(pt.emoji, pt.x, pt.y); } }
  ctx.globalAlpha = 1; game.particles = game.particles.filter(p => p.life > 0);

  const collectedScrolls = game.scrolls.filter(s => s.collected);
  const cardW = Math.min(560, W * 0.85), cardX = W / 2 - cardW / 2;

  // Calculate card height
  const hasScrolls = collectedScrolls.length > 0;
  const scrollRowH = hasScrolls ? 80 : 0;
  const bonusH = 30;
  const cardH = 230 + scrollRowH + bonusH;
  const cardY = Math.max(10, H / 2 - cardH / 2);

  ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 24); ctx.fill();
  ctx.strokeStyle = '#66BB6A'; ctx.lineWidth = 4; ctx.stroke();

  // Header
  ctx.font = '36px serif'; ctx.textAlign = 'center'; ctx.fillText(lvl.factEmoji, W / 2, cardY + 42);
  ctx.font = `bold ${Math.min(26, W * 0.04)}px Comic Sans MS, cursive`; ctx.fillStyle = '#2E7D32';
  ctx.fillText(`${lvl.emoji} ${lvl.name} Complete!`, W / 2, cardY + 76);

  // Score breakdown
  let sy = cardY + 105;
  ctx.font = `bold ${Math.min(18, W * 0.028)}px Comic Sans MS, cursive`; ctx.textAlign = 'center';

  // Blossom score
  const blossomBase = 100 * (1 + game.level);
  ctx.fillStyle = '#555';
  ctx.fillText(`🌸 ${game.blossoms.length} blossoms × ${blossomBase} pts`, W / 2, sy);
  sy += 24;

  // Multiplier
  if (game.multiplier > 1) {
    ctx.fillStyle = '#FFB300';
    ctx.fillText(`📜 x${game.multiplier} scroll multiplier!`, W / 2, sy);
    sy += 24;
  }

  // Lives bonus
  const livesBonus = game.lives * 500 * game.multiplier;
  ctx.fillStyle = '#E91E63';
  ctx.fillText(`❤️ ${game.lives} lives remaining × 500 = +${livesBonus.toLocaleString()}`, W / 2, sy);
  sy += 30;

  // Total level score
  ctx.font = `bold ${Math.min(28, W * 0.04)}px Comic Sans MS, cursive`;
  ctx.fillStyle = '#2E7D32';
  ctx.fillText(`Level Score: ${game.levelScore.toLocaleString()} 🌟`, W / 2, sy);
  sy += 26;
  ctx.font = `${Math.min(16, W * 0.025)}px Comic Sans MS, cursive`;
  ctx.fillStyle = '#888';
  ctx.fillText(`Total: ${game.score.toLocaleString()}`, W / 2, sy);
  sy += 20;

  // Scrolls section — must open all to continue
  const allRevealed = collectedScrolls.length === 0 || game.scrollsRevealed.length >= collectedScrolls.length;

  if (hasScrolls) {
    sy += 8;
    ctx.font = `bold ${Math.min(14, W * 0.022)}px Comic Sans MS, cursive`;
    ctx.fillStyle = allRevealed ? '#43A047' : '#FF6B35'; ctx.textAlign = 'center';
    const scrollLabel = allRevealed
      ? 'All facts revealed!'
      : `Open your ${collectedScrolls.length} mystery scroll${collectedScrolls.length > 1 ? 's' : ''}! (${game.scrollsRevealed.length}/${collectedScrolls.length})`;
    ctx.fillText(scrollLabel, W / 2, sy);
    sy += 28;

    const spacing = 72;
    const totalW = collectedScrolls.length * spacing;
    const startX = W / 2 - totalW / 2 + spacing / 2;
    game.lcScrollY = sy;
    game.lcScrollStartX = startX;

    for (let i = 0; i < collectedScrolls.length; i++) {
      const sx = startX + i * spacing;
      const revealed = game.scrollsRevealed.includes(i);
      const bob = Math.sin(game.time * 0.06 + i * 1.5) * 5;
      const wiggle = revealed ? 0 : Math.sin(game.time * 0.1 + i * 2) * 0.08;

      ctx.save();
      ctx.translate(sx, sy + bob);
      ctx.rotate(wiggle);

      if (revealed) {
        // Opened scroll — warm glow
        ctx.shadowColor = '#FFD54F'; ctx.shadowBlur = 12;
        ctx.font = '34px serif'; ctx.textAlign = 'center';
        ctx.fillText('📜', 0, 12);
        ctx.shadowBlur = 0;
        // Checkmark
        ctx.font = 'bold 14px serif';
        ctx.fillText('✅', 16, -6);
      } else {
        // Mystery box — glowing, bouncing, exciting!
        // Sparkle ring
        const glowR = 26 + Math.sin(game.time * 0.08 + i) * 4;
        ctx.strokeStyle = '#FFD54F';
        ctx.lineWidth = 2.5;
        ctx.globalAlpha = 0.5 + Math.sin(game.time * 0.1 + i * 1.3) * 0.3;
        ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;

        // Question mark box
        ctx.fillStyle = '#FF6B35';
        ctx.beginPath(); ctx.roundRect(-22, -22, 44, 44, 10); ctx.fill();
        ctx.strokeStyle = '#FFD54F'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(-22, -22, 44, 44, 10); ctx.stroke();

        ctx.font = 'bold 26px Comic Sans MS, cursive';
        ctx.fillStyle = '#FFF'; ctx.textAlign = 'center';
        ctx.fillText('?', 0, 10);

        // Sparkle particles around unopened boxes
        if (game.time % 20 === (i * 7) % 20) {
          const angle = Math.random() * Math.PI * 2;
          game.particles.push({
            x: sx + Math.cos(angle) * 30, y: (sy + bob) + Math.sin(angle) * 30,
            vx: Math.cos(angle) * 0.5, vy: -0.5 - Math.random(),
            life: 0.8, decay: 0.02, size: 10, emoji: '✨',
          });
        }
      }

      ctx.restore();
    }
    sy += 40;
  } else {
    sy += 8;
    ctx.font = `${Math.min(14, W * 0.022)}px Comic Sans MS, cursive`;
    ctx.fillStyle = '#aaa'; ctx.textAlign = 'center';
    ctx.fillText('No scrolls found — grab some for a score multiplier!', W / 2, sy);
    sy += 20;
  }

  // Next prompt — only show if all scrolls revealed
  if (allRevealed) {
    const nextText = game.level + 1 < LEVELS.length ? 'Press SPACE or tap for next level!' : 'Press SPACE or tap to see your encyclopedia!';
    const pulse = 1 + Math.sin(game.time * 0.06) * 0.06;
    ctx.save(); ctx.translate(W / 2, cardY + cardH - 20); ctx.scale(pulse, pulse);
    ctx.font = `bold ${Math.min(17, W * 0.026)}px Comic Sans MS, cursive`; ctx.fillStyle = '#FF6B35'; ctx.textAlign = 'center';
    ctx.fillText(nextText, 0, 0); ctx.restore();
  }

  // Open scroll overlay — shows fact when clicking a revealed scroll
  if (game.openScrollIdx >= 0 && game.openScrollIdx < collectedScrolls.length && game.scrollsRevealed.includes(game.openScrollIdx)) {
    const fact = collectedScrolls[game.openScrollIdx].fact;
    drawFactBanner(fact.text, '📜', 1, true);
  }
}

}

function drawEncyclopedia() {
  const W = canvas.width, H = canvas.height;
  const grad = ctx.createLinearGradient(0, 0, 0, H); grad.addColorStop(0, '#FFF8E1'); grad.addColorStop(1, '#E8F5E9');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.font = `bold ${Math.min(36, W * 0.05)}px Comic Sans MS, cursive`; ctx.fillStyle = '#2E7D32'; ctx.textAlign = 'center';
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeText('Tree & Pollinator Encyclopedia', W / 2, 45); ctx.fillText('Tree & Pollinator Encyclopedia', W / 2, 45);
  ctx.font = `${Math.min(16, W * 0.025)}px Comic Sans MS, cursive`; ctx.fillStyle = '#888';
  ctx.fillText(`${collectedFacts.length} facts discovered  |  📜 ${totalScrollsCollected} scrolls  |  🌟 ${game.score.toLocaleString()} points`, W / 2, 72);
  const unique = []; const seen = new Set();
  for (const f of collectedFacts) { if (!seen.has(f.text)) { seen.add(f.text); unique.push(f); } }
  const startY = 95, entryH = 75, visibleH = H - startY - 50;
  const maxScroll = Math.max(0, unique.length * entryH - visibleH);
  game.encyclopediaScroll = Math.min(game.encyclopediaScroll, maxScroll);
  ctx.save(); ctx.beginPath(); ctx.rect(0, startY, W, visibleH); ctx.clip();
  const cardW = Math.min(600, W * 0.9), cardX = W / 2 - cardW / 2;
  const emojiForType = { tree: '🌳', obstacle: '⚡' };
  for (let i = 0; i < unique.length; i++) {
    const f = unique[i], ey = startY + i * entryH - game.encyclopediaScroll;
    if (ey > H || ey + entryH < startY) continue;
    ctx.fillStyle = f.type === 'tree' ? 'rgba(200,230,201,0.8)' : 'rgba(255,224,178,0.8)';
    ctx.beginPath(); ctx.roundRect(cardX, ey + 4, cardW, entryH - 8, 14); ctx.fill();
    ctx.strokeStyle = f.type === 'tree' ? '#A5D6A7' : '#FFCC80'; ctx.lineWidth = 2; ctx.stroke();
    ctx.font = '20px serif'; ctx.textAlign = 'left'; ctx.fillText(emojiForType[f.type] || '🌱', cardX + 14, ey + 30);
    ctx.font = 'bold 13px Comic Sans MS, cursive'; ctx.fillStyle = '#999'; ctx.fillText(`#${i + 1}`, cardX + 14, ey + 50);
    ctx.font = `${Math.min(15, W * 0.023)}px Comic Sans MS, cursive`; ctx.fillStyle = '#444'; ctx.textAlign = 'left';
    const words = f.text.split(' '), maxTW = cardW - 70; let line = '', ly = ey + 28;
    for (const word of words) { const test = line + word + ' '; if (ctx.measureText(test).width > maxTW && line) { ctx.fillText(line.trim(), cardX + 52, ly); line = word + ' '; ly += 20; } else line = test; }
    if (line) ctx.fillText(line.trim(), cardX + 52, ly);
  }
  ctx.restore();
  if (game.encyclopediaScroll > 0) { ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.fillText('▲', W / 2, startY + 16); }
  if (game.encyclopediaScroll < maxScroll) { ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.fillText('▼', W / 2, H - 42); }
  const pulse = 1 + Math.sin(game.time * 0.06) * 0.06;
  ctx.save(); ctx.translate(W / 2, H - 20); ctx.scale(pulse, pulse);
  ctx.font = `bold ${Math.min(16, W * 0.025)}px Comic Sans MS, cursive`; ctx.fillStyle = '#FF6B35'; ctx.textAlign = 'center';
  ctx.fillText('Press SPACE or tap to continue', 0, 0); ctx.restore();
}

function drawWinScreen() {
  const W = canvas.width, H = canvas.height;
  const grad = ctx.createLinearGradient(0, 0, 0, H); grad.addColorStop(0, '#FFF8E1'); grad.addColorStop(1, '#C8E6C9');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  if (game.time % 5 === 0) { const es = ['🌟', '✨', '🎉', '🏆', '🌸', '🌺', '🌼', '🐝', '🪲', '🐦', '🦇']; game.particles.push({ x: Math.random() * W, y: -20, vx: (Math.random() - 0.5) * 3, vy: 1.5 + Math.random() * 2.5, life: 1, decay: 0.004, size: 22 + Math.random() * 14, emoji: es[Math.floor(Math.random() * es.length)] }); }
  for (const pt of game.particles) { pt.x += pt.vx || 0; pt.y += pt.vy || 0; pt.life -= pt.decay; ctx.globalAlpha = pt.life; if (pt.emoji) { ctx.font = `${pt.size}px serif`; ctx.textAlign = 'center'; ctx.fillText(pt.emoji, pt.x, pt.y); } }
  ctx.globalAlpha = 1; game.particles = game.particles.filter(p => p.life > 0);
  ctx.font = `bold ${Math.min(56, W * 0.08)}px Comic Sans MS, cursive`; ctx.fillStyle = '#2E7D32'; ctx.textAlign = 'center';
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.strokeText('You did it!', W / 2, H * 0.28); ctx.fillText('You did it!', W / 2, H * 0.28);
  ctx.font = '52px serif'; ctx.fillText('🏆🌳🎉', W / 2, H * 0.4);
  ctx.font = `${Math.min(22, W * 0.03)}px Comic Sans MS, cursive`; ctx.fillStyle = '#555';
  ctx.fillText('All the trees are pollinated! Nature says thank you!', W / 2, H * 0.5);

  // Final score
  ctx.font = `bold ${Math.min(36, W * 0.05)}px Comic Sans MS, cursive`; ctx.fillStyle = '#FF6B35';
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  ctx.strokeText(`Final Score: ${game.score.toLocaleString()} 🌟`, W / 2, H * 0.58);
  ctx.fillText(`Final Score: ${game.score.toLocaleString()} 🌟`, W / 2, H * 0.58);

  ctx.font = `${Math.min(18, W * 0.028)}px Comic Sans MS, cursive`; ctx.fillStyle = '#888';
  ctx.fillText(`📜 ${totalScrollsCollected} scrolls collected  |  ${collectedFacts.length} facts learned`, W / 2, H * 0.64);

  const pulse = 1 + Math.sin(game.time * 0.06) * 0.06;
  ctx.save(); ctx.translate(W / 2, H * 0.73); ctx.scale(pulse, pulse);
  ctx.font = `bold ${Math.min(22, W * 0.03)}px Comic Sans MS, cursive`; ctx.fillStyle = '#FF6B35';
  ctx.fillText('Press SPACE or tap to play again!', 0, 0); ctx.restore();
}

// ── Main Loop ──
function loop() {
  game.time++;
  update();
  if (game.screen === 'title') drawTitleScreen();
  else if (game.screen === 'intro') drawIntroScreen();
  else if (game.screen === 'playing') draw();
  else if (game.screen === 'levelComplete') drawLevelCompleteScreen();
  else if (game.screen === 'gameover') { draw(); drawGameOver(); }
  else if (game.screen === 'encyclopedia') drawEncyclopedia();
  else if (game.screen === 'win') drawWinScreen();
  requestAnimationFrame(loop);
}
loop();
</script>
